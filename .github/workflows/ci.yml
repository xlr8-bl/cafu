name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint, style, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, mbstring, intl, zip
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('app/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        working-directory: app
        run: composer install --no-interaction --prefer-dist

      - name: PHP syntax lint
        run: find app/src app/public -name "*.php" -print0 | xargs -0 -n1 -P4 php -l

      - name: PSR-12 style
        working-directory: app
        run: vendor/bin/phpcs --standard=../phpcs.xml

      - name: Unit tests
        working-directory: app
        run: vendor/bin/phpunit --configuration phpunit.xml --testdox

      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: build/junit.xml
          if-no-files-found: ignore

  docker-build:
    name: Build container image
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: srwa/php:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    name: Integration smoke
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4
      - name: Spin up stack
        run: |
          cp .env.example .env
          docker compose up -d --wait
      - name: Hit healthz
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8080/healthz && exit 0
            sleep 2
          done
          docker compose logs
          exit 1
      - name: Tear down
        if: always()
        run: docker compose down -v
