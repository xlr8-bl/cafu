name: srwa

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: srwa/php:dev
    container_name: srwa-php
    env_file: .env
    volumes:
      - ./app:/var/www/html:cached
      # Named volume preserves the vendor/ baked into the image so the bind mount above
      # does not mask it (host has no vendor/ because composer is not installed locally).
      - app_vendor:/var/www/html/vendor
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks: [srwa]

  # Apply schema migrations. Runs once on every `up`, exits when done.
  # Idempotent — Phinx tracks applied versions in the `schema_migrations` table.
  # Shares the php image build so vendor/ (incl. phinx) is available.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: srwa/php:dev
    container_name: srwa-migrate
    env_file: .env
    volumes:
      - ./db:/srwa-db:ro
      - ./scripts/migrate.sh:/usr/local/bin/migrate.sh:ro
      - app_vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
    networks: [srwa]
    entrypoint: ["sh", "/usr/local/bin/migrate.sh"]
    restart: "no"

  # One-shot Vite build. Writes app/public/dist/ on the host via the bind mount.
  # node_modules is cached in a named volume so repeat runs are fast.
  web_build:
    image: node:20-alpine
    container_name: srwa-web-build
    working_dir: /web
    volumes:
      - ./app/web:/web:cached
      - ./app/public/dist:/web/dist
      - app_web_modules:/web/node_modules
    command: sh -c "npm install --no-audit --no-fund --prefer-offline && npm run build"
    restart: "no"
    networks: [srwa]

  nginx:
    image: nginx:1.27-alpine
    container_name: srwa-nginx
    # No host port — Caddy is the public entrypoint.
    expose: ["80"]
    volumes:
      - ./app/public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started
      web_build:
        condition: service_completed_successfully
    networks: [srwa]

  # Nightly mysqldump sidecar. Writes to a named volume; 7-day rotation.
  # See docs/RUNBOOK.md for restore steps.
  backup:
    build:
      context: ./docker/backup
    image: srwa/backup:dev
    container_name: srwa-backup
    env_file: .env
    environment:
      BACKUP_RETENTION_DAYS: "7"
    volumes:
      - srwa_backups:/backups
    depends_on:
      mysql:
        condition: service_healthy
    networks: [srwa]
    restart: unless-stopped

  # Public-facing reverse proxy. Dev: HTTP on :8090. Prod: set SITE_ADDRESS to
  # a real domain, map ports 80:80 + 443:443, and Caddy auto-issues a TLS cert.
  caddy:
    image: caddy:2.8-alpine
    container_name: srwa-caddy
    env_file: .env
    ports:
      - "8090:80"
      - "8493:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      nginx:
        condition: service_started
    networks: [srwa]
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: srwa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
      # Schema is owned by Phinx (db/migrations/). Seed data is opt-in via `make seed`.
      - ./db/seed.sql:/srwa-seed.sql:ro
    ports:
      - "3307:3306"
    healthcheck:
      # 127.0.0.1 (not localhost) forces TCP — otherwise mysqladmin connects via
      # the unix socket, which is available before the TCP listener is up, and
      # downstream services try to connect over TCP before mysql is really ready.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks: [srwa]

  # Vite dev server with HMR. Opt-in: `docker compose --profile dev up web_dev`
  # Open http://localhost:5173 — proxies /api to nginx.
  web_dev:
    image: node:20-alpine
    container_name: srwa-web-dev
    profiles: ["dev"]
    working_dir: /web
    volumes:
      - ./app/web:/web:cached
      - app_web_modules:/web/node_modules
    command: sh -c "npm install --no-audit --no-fund --prefer-offline && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://nginx:80
    depends_on: [nginx]
    networks: [srwa]

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: srwa-pma
    profiles: ["dev"]
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASS}
    ports:
      - "8081:80"
    depends_on: [mysql]
    networks: [srwa]

volumes:
  mysql_data:
  app_vendor:
  app_web_modules:
  caddy_data:
  caddy_config:
  srwa_backups:

networks:
  srwa:
    driver: bridge
