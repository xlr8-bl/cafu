# Compose overrides used inside Jenkins. Mainly: no phpmyadmin, deterministic ports, no bind mounts for app.
services:
  php:
    volumes: !reset []
  nginx:
    ports:
      - "8080:80"
    volumes:
      - ./app/public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  mysql:
    ports: !reset []
